<div class="page-container">
  <div class="page-header">
    <button class="btn-back" (click)="cancel()">
      <span class="material-symbols-outlined">arrow_back</span> Volver
    </button>
  </div>

  <div class="form-wrapper glass-card">
    <div class="form-header">
      <span class="form-icon material-symbols-outlined">add_circle</span>
      <div>
        <h1 class="form-title">Nuevo Trámite</h1>
        <p class="form-subtitle">Completa los datos para iniciar tu trámite</p>
      </div>
    </div>

    @if (error()) {
      <div class="alert alert--error">
        <span class="material-symbols-outlined">error</span> {{ error() }}
      </div>
    }

    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Título del trámite <span class="required">*</span></label>
        <input class="form-input" type="text" [(ngModel)]="form.titulo"
          placeholder="Ej: Solicitud de permiso de construcción" maxlength="120" />
      </div>

      <div class="form-group">
        <label class="form-label">Política / Tipo <span class="required">*</span></label>
        @if (loadingPols()) {
          <p class="loading-inline">
            <span class="material-symbols-outlined spin">progress_activity</span> Cargando políticas...
          </p>
        } @else {
          <select class="form-select" [(ngModel)]="form.politicaId">
            <option value="">Selecciona una política</option>
            @for (p of politicas(); track p.id) {
              <option [value]="p.id">{{ p.nombre }}</option>
            }
          </select>
        }
      </div>

      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea class="form-textarea" [(ngModel)]="form.descripcion"
          placeholder="Describe brevemente el motivo de tu trámite..."
          rows="4" maxlength="500">
        </textarea>
        <span class="char-count">{{ form.descripcion.length }}/500</span>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn--outline" (click)="cancel()">Cancelar</button>
      <button class="btn btn--primary" [disabled]="!isValid || submitting()" (click)="submit()">
        <span class="material-symbols-outlined">{{ submitting() ? 'progress_activity' : 'send' }}</span>
        {{ submitting() ? 'Enviando...' : 'Crear Trámite' }}
      </button>
    </div>
  </div>
</div>
